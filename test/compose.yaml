name: my_secure_file_transfer

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "1234:1234"
    networks:
      static_network:
        ipv4_address: 10.5.0.10

networks:
  static_network:
    driver: bridge
    ipam:
      config:
        - subnet: 10.5.0.0/24
          gateway: 10.5.0.1